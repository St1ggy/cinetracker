# Dev branch: build + run migrations on dev DB
name: CI (dev)

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  statuses: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          else
            echo "Skipping vercel pull: VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID is not fully configured."
          fi

      - name: Generate Prisma Client
        env:
          DIRECT_DEV_DATABASE_URL: ${{ secrets.DIRECT_DEV_DATABASE_URL }}
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
        run: |
          if [ -f .vercel/.env.preview.local ]; then
            set -a
            . ./.vercel/.env.preview.local
            set +a
          fi
          export DATABASE_URL="${DIRECT_DEV_DATABASE_URL:-${DEV_DATABASE_URL:-${DATABASE_URL:-postgresql://localhost:5432/dummy}}}"
          npx prisma generate

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

  migrate:
    name: Run Prisma Migrations (dev DB)
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment (preview)
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            npx vercel pull --yes --environment=preview --token="$VERCEL_TOKEN"
          else
            echo "Skipping vercel pull: VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID is not fully configured."
          fi

      - name: Deploy migrations (dev)
        env:
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DIRECT_DEV_DATABASE_URL: ${{ secrets.DIRECT_DEV_DATABASE_URL }}
        run: |
          if [ -f .vercel/.env.preview.local ]; then
            set -a
            . ./.vercel/.env.preview.local
            set +a
          fi
          export DATABASE_URL="${DIRECT_DEV_DATABASE_URL:-${DEV_DATABASE_URL:-}}"
          if [ -z "$DATABASE_URL" ]; then
            echo "DEV_DATABASE_URL (or DIRECT_DEV_DATABASE_URL) is not set in Vercel or GitHub secrets. Skipping migrations."
            exit 0
          fi
          set +e
          OUT=$(npx prisma migrate deploy 2>&1)
          CODE=$?
          set -e
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qE "already exists|P3018"; then
              echo "Recovery: marking 20260220000000_initial as applied (schema already present)."
              npx prisma migrate resolve --applied 20260220000000_initial
              npx prisma migrate deploy
            else
              echo "$OUT"
              exit $CODE
            fi
          fi
