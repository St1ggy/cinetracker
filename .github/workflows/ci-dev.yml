# Dev branch: build + run migrations on dev DB
name: CI (dev)

on:
  push:
    branches:
      - dev

permissions:
  contents: read
  statuses: write

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Check
        run: npm run check

      - name: Build
        run: npm run build

  migrate:
    name: Run Prisma Migrations (dev DB)
    runs-on: ubuntu-latest
    needs: build
    if: ${{ !contains(github.event.head_commit.message, '[skip ci]') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Deploy migrations (dev)
        env:
          DEV_DATABASE_URL: ${{ secrets.DEV_DATABASE_URL }}
          DIRECT_DEV_DATABASE_URL: ${{ secrets.DIRECT_DEV_DATABASE_URL }}
        run: |
          export DATABASE_URL="${DIRECT_DEV_DATABASE_URL:-${DEV_DATABASE_URL:-}}"
          if [ -z "$DATABASE_URL" ]; then
            echo "DEV_DATABASE_URL (or DIRECT_DEV_DATABASE_URL) is not set in GitHub secrets. Skipping migrations."
            exit 0
          fi
          set +e
          OUT=$(npx prisma migrate deploy 2>&1)
          CODE=$?
          set -e
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qE "already exists|P3018"; then
              echo "Recovery: marking 20260220000000_initial as applied (schema already present)."
              npx prisma migrate resolve --applied 20260220000000_initial
              npx prisma migrate deploy
            else
              echo "$OUT"
              exit $CODE
            fi
          fi
