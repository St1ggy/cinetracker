# Main (prod): run migrations on production DB. Push to main is manual (merge from dev).
name: Migrate DB (prod)

on:
  push:
    branches:
      - main

permissions:
  contents: read
  statuses: write

jobs:
  migrate:
    name: Run Prisma Migrations (prod DB)
    runs-on: ubuntu-latest
    if: ${{ !startsWith(github.event.head_commit.message, 'chore(release):') }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.12

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Pull Vercel environment
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
        run: |
          if [ -n "$VERCEL_TOKEN" ] && [ -n "$VERCEL_ORG_ID" ] && [ -n "$VERCEL_PROJECT_ID" ]; then
            npx vercel pull --yes --environment=production --token="$VERCEL_TOKEN"
          else
            echo "Skipping vercel pull: VERCEL_TOKEN/VERCEL_ORG_ID/VERCEL_PROJECT_ID is not fully configured."
          fi

      - name: Deploy migrations
        env:
          DIRECT_DATABASE_URL: ${{ secrets.DIRECT_DATABASE_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          POSTGRES_PRISMA_URL: ${{ secrets.POSTGRES_PRISMA_URL }}
        run: |
          if [ -f .vercel/.env.production.local ]; then
            set -a
            . ./.vercel/.env.production.local
            set +a
          fi

          export DATABASE_URL="${DIRECT_DATABASE_URL:-${DATABASE_URL:-${POSTGRES_PRISMA_URL:-}}}"

          if [ -z "$DATABASE_URL" ]; then
            echo "DATABASE_URL is not set in Vercel or GitHub secrets."
            exit 1
          fi

          set +e
          OUT=$(npx prisma migrate deploy 2>&1)
          CODE=$?
          set -e
          if [ $CODE -ne 0 ]; then
            if echo "$OUT" | grep -qE "already exists|P3018"; then
              echo "Recovery: marking 20260220000000_initial as applied (schema already present)."
              npx prisma migrate resolve --applied 20260220000000_initial
              npx prisma migrate deploy
            elif echo "$OUT" | grep -qE "P3089|failed migrations"; then
              echo "Recovery: resolving failed migration 20260220000000_initial and retrying."
              npx prisma migrate resolve --rolled-back 20260220000000_initial
              npx prisma migrate deploy
            else
              echo "$OUT"
              exit $CODE
            fi
          fi

      - name: 'notify vercel'
        uses: 'vercel/repository-dispatch/actions/status@v1'
        with:
          name: 'Vercel - cinetracker: all checks'
